[pytest]
# Pytest configuration for OctiVault Trading Bot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    slow: marks tests as slow
    exchange: marks tests requiring exchange mock
    market_data: marks tests requiring market data mock
    database: marks tests requiring database mock

# Test output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Coverage options
testpaths = tests
norecursedirs = .git .venv __pycache__ *.egg-info build dist

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300

# Minimum Python version
minversion = 6.0
