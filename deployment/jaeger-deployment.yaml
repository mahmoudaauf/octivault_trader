---
# Jaeger All-In-One Deployment for APM Tracing
# Issue #19: APM Instrumentation
#
# This deployment includes:
# - Jaeger Agent (UDP receiver)
# - Jaeger Collector (trace processing)
# - Jaeger Query UI (trace visualization)
# - Elasticsearch backend (optional, uses in-memory by default)
#
# Ports:
#  6831/udp - Agent (receive spans from apps)
#  6832/udp - Agent (compact thrift)
#  5778    - Agent (serve configs)
#  16686   - Query UI (web interface)
#  14268   - Collector (HTTP)
#  14250   - Collector (gRPC)

apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: default
  labels:
    app: jaeger
data:
  sampling.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 1.0
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-agent
  namespace: default
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - name: jaeger-agent-zipkin-thrift
    port: 6831
    protocol: UDP
    targetPort: 6831
  - name: jaeger-agent-compact
    port: 6832
    protocol: UDP
    targetPort: 6832
  - name: jaeger-agent-config
    port: 5778
    protocol: TCP
    targetPort: 5778
  selector:
    app: jaeger

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: default
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - name: jaeger-collector-http
    port: 14268
    protocol: TCP
    targetPort: 14268
  - name: jaeger-collector-grpc
    port: 14250
    protocol: TCP
    targetPort: 14250
  - name: jaeger-collector-zipkin
    port: 9411
    protocol: TCP
    targetPort: 9411
  selector:
    app: jaeger

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: default
  labels:
    app: jaeger
spec:
  type: NodePort
  ports:
  - name: jaeger-query
    port: 16686
    protocol: TCP
    targetPort: 16686
    nodePort: 30686
  selector:
    app: jaeger

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: default
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.40
        imagePullPolicy: IfNotPresent
        ports:
        # Agent ports
        - name: agent-zipkin
          containerPort: 6831
          protocol: UDP
        - name: agent-compact
          containerPort: 6832
          protocol: UDP
        - name: agent-config
          containerPort: 5778
          protocol: TCP
        # Collector ports
        - name: collector-http
          containerPort: 14268
          protocol: TCP
        - name: collector-grpc
          containerPort: 14250
          protocol: TCP
        - name: collector-zipkin
          containerPort: 9411
          protocol: TCP
        # Query UI
        - name: query
          containerPort: 16686
          protocol: TCP
        
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: COLLECTOR_OTLP_HOST_METRICS
          value: ":8888"
        - name: SPAN_STORAGE_TYPE
          value: "memory"  # Use "elasticsearch" for production
        - name: MEMORY_MAX_TRACES
          value: "10000"
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: "/"
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: "/"
            port: 16686
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        - name: config
          mountPath: /etc/jaeger
          readOnly: true
      
      volumes:
      - name: config
        configMap:
          name: jaeger-config

---
# RBAC for Jaeger
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jaeger
  namespace: default
  labels:
    app: jaeger

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jaeger
spec:
  rules:
  - apiGroups: [""]
    resources:
    - nodes
    - nodes/proxy
    - services
    - endpoints
    - pods
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jaeger
spec:
  roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: jaeger
  subjects:
  - kind: ServiceAccount
    name: jaeger
    namespace: default
