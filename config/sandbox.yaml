# Sandbox Configuration for Phase 4 Testing
# Portfolio Fragmentation Fixes - 48+ Hour Monitoring

environment: sandbox
phase: 4
monitoring_duration_hours: 48
test_date: 2026-04-26

# Sandbox Data Configuration
data:
  # Use production-like portfolio data but in controlled sandbox environment
  sample_portfolio:
    - symbol: "BTCUSDT"
      quantity: 1.5
      entry_price: 45000
      current_price: 45000
    - symbol: "ETHUSDT"
      quantity: 10.0
      entry_price: 2500
      current_price: 2500
    - symbol: "BNBUSDT"
      quantity: 50.0
      entry_price: 400
      current_price: 400
    - symbol: "ADAUSDT"
      quantity: 1000.0
      entry_price: 0.5
      current_price: 0.5
    - symbol: "XRPUSDT"
      quantity: 5000.0
      entry_price: 0.5
      current_price: 0.5
    - symbol: "DOGEUSDT"
      quantity: 10000.0
      entry_price: 0.1
      current_price: 0.1
    - symbol: "LITUSDT"
      quantity: 100.0
      entry_price: 150
      current_price: 150
    - symbol: "LINKUSDT"
      quantity: 200.0
      entry_price: 30
      current_price: 30
    - symbol: "UNIUSDT"
      quantity: 300.0
      entry_price: 20
      current_price: 20
    - symbol: "MATICUSDT"
      quantity: 5000.0
      entry_price: 1.0
      current_price: 1.0

# Fragmentation Testing Configuration
fragmentation_testing:
  # Initial state: Healthy portfolio
  phase_1_duration_hours: 8
  phase_1_description: "Monitor healthy portfolio state"
  
  # Add dust positions to create fragmentation
  phase_2_duration_hours: 12
  phase_2_description: "Inject small positions to create FRAGMENTED state"
  phase_2_dust_injection:
    count: 15
    min_value_usd: 10
    max_value_usd: 50
  
  # Further fragmentation to reach SEVERE state
  phase_3_duration_hours: 12
  phase_3_description: "Add more dust to trigger SEVERE fragmentation"
  phase_3_dust_injection:
    count: 20
    min_value_usd: 5
    max_value_usd: 25
  
  # Monitor recovery
  phase_4_duration_hours: 16
  phase_4_description: "Monitor automatic recovery via consolidation"

# Portfolio Health Thresholds (FIX 3)
health_check:
  enabled: true
  run_every_cycle: true
  herfindahl_thresholds:
    healthy:
      min: 0.25
      max: 1.0
      description: "Portfolio is well-diversified"
    fragmented:
      min: 0.15
      max: 0.24
      description: "Portfolio has moderate fragmentation"
    severe:
      min: 0.0
      max: 0.14
      description: "Portfolio is heavily fragmented with many dust positions"

# Position Sizing Adaptation (FIX 4)
position_sizing:
  enabled: true
  base_position_size_usd: 100
  health_multipliers:
    healthy: 1.0
    fragmented: 0.5
    severe: 0.25
  min_position_size_usd: 10
  max_position_size_usd: 500

# Portfolio Consolidation (FIX 5)
consolidation:
  enabled: true
  trigger_herfindahl: 0.15  # Trigger on SEVERE fragmentation
  rate_limit_hours: 2
  max_positions_per_cycle: 10
  consolidation_method: "aggressive"  # "conservative" or "aggressive"

# Prevention Fixes (FIX 1-2)
position_prevention:
  min_position_size_usd: 50
  validate_on_new_position: true
  auto_split_on_purchase: true
  split_threshold_usd: 25

# Monitoring Configuration
monitoring:
  # Real-time metrics collection
  metrics_collection_interval_seconds: 60
  metrics_to_collect:
    - portfolio_herfindahl_index
    - portfolio_health_status
    - current_position_count
    - dust_position_count
    - size_multiplier_current
    - time_since_last_consolidation
    - consolidation_frequency
    - cycle_duration_ms
    - health_check_duration_ms
    - error_count
    - recovery_success_rate

  # Dashboard updates
  dashboard_refresh_seconds: 60
  dashboard_metrics:
    - current_state
    - trend_24h
    - performance_metrics
    - health_history

  # Alert thresholds
  alerts:
    cpu_usage_threshold: 80
    memory_usage_threshold_mb: 500
    health_check_duration_threshold_ms: 200
    cycle_duration_threshold_ms: 50
    error_rate_threshold: 0.01

# Logging Configuration
logging:
  level: "INFO"
  output_files:
    - "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/logs/sandbox_phase4.log"
    - "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/logs/metrics.log"
  metrics_file: "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/logs/phase4_metrics.json"
  
  # Archive and backup
  archive_interval_hours: 24
  backup_enabled: true
  backup_location: "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/backups/"

# Success Criteria
success_criteria:
  - "48+ hours continuous operation without critical errors"
  - "Zero regressions from Phase 3 tests"
  - "Portfolio health detection working correctly"
  - "Position sizing adaptation responding to health changes"
  - "Consolidation triggering on SEVERE fragmentation"
  - "Rate limiting preventing consolidation thrashing"
  - "All monitoring metrics collected successfully"
  - "Performance within expected baselines"
  - "No memory leaks detected"
  - "Error recovery functioning properly"

# Deployment Settings
deployment:
  environment: "sandbox"
  data_persistence: true
  state_file: "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/sandbox_state.json"
  backup_state: true
  snapshot_interval_minutes: 15

# Phase 4 Timeline
phase_4_timeline:
  start_date: "2026-04-26"
  total_duration_days: 3
  
  day_1:
    tasks:
      - "Setup sandbox environment"
      - "Deploy code to sandbox"
      - "Verify health check functionality"
      - "Validate consolidation logic"
      - "Start continuous monitoring"
  
  day_2:
    tasks:
      - "Monitor 24 hours of data"
      - "Check for any anomalies"
      - "Verify metrics collection"
      - "Test error recovery paths"
  
  day_3:
    tasks:
      - "Complete 48+ hour monitoring"
      - "Analyze comprehensive dataset"
      - "Generate performance report"
      - "Validate zero regressions"
      - "Approve Phase 5 deployment"

# Rollback Configuration
rollback:
  enabled: true
  rollback_trigger: "critical_error"
  rollback_to_version: "phase_3_validated"
  state_recovery: true
  notification_on_rollback: true

# Documentation
documentation:
  report_template: "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/templates/phase4_report.md"
  final_report_path: "/Users/mauf/Desktop/Octi AI Trading Bot/octivault_trader/PHASE_4_VALIDATION_REPORT.md"
  
notes: |
  Phase 4 will validate the portfolio fragmentation fixes in a production-like
  sandbox environment with 48+ hours of continuous monitoring. This ensures
  that all fixes are working correctly before production deployment.
  
  Key objectives:
  1. Deploy all 5 fixes to sandbox
  2. Inject fragmentation to test detection and recovery
  3. Collect performance baselines
  4. Verify zero regressions from Phase 3
  5. Approve Phase 5 production deployment
